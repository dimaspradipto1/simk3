<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Logo HSE">
  <defs>
    <linearGradient id="hseBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5c3d" />
      <stop offset="100%" stop-color="#073c28" />
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#hseBadge)" />

  <!-- Center disc -->
  <circle cx="50" cy="50" r="30" fill="#ffffff" />

  <!-- Three petals representing Health, Safety, Environment -->
  <g>
    <path d="M50,50 C39,39 39,20 50,12 C61,20 61,39 50,50 Z" fill="#0b5c3d" />
    <path d="M50,50 C39,39 39,20 50,12 C61,20 61,39 50,50 Z" fill="#f7941d"
      transform="rotate(120 50 50)" />
    <path d="M50,50 C39,39 39,20 50,12 C61,20 61,39 50,50 Z" fill="#ffc72c"
      transform="rotate(240 50 50)" />
  </g>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="7" fill="#ffffff" stroke="#0b5c3d" stroke-width="2.5" />
</svg>
